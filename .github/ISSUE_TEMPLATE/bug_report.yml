name: Bug report
description: Report a reproducible Parsnip plugin, skill, or local-runtime problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Parsnip. Use synthetic examples and do not include secrets, private transcripts, participant information, or captured answers.
  - type: input
    id: version
    attributes:
      label: Parsnip version
      description: Copy the version from the installed plugin or plugin manifest.
      placeholder: 0.1.0+codex...
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Codex desktop app
        - Codex CLI
        - Codex IDE extension
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Provide the smallest safe example that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed secrets, private content, participant information, local paths, and thread identifiers.
          required: true
