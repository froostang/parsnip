name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate JSON manifests
        run: |
          python -m json.tool .agents/plugins/marketplace.json >/dev/null
          python -m json.tool plugins/parsnip/.codex-plugin/plugin.json >/dev/null
          python -m json.tool plugins/parsnip/.mcp.json >/dev/null
      - name: Run usage harness tests
        run: python -m unittest evals.test_usage_harness
      - name: Run local runtime tests
        run: node --test plugins/parsnip/mcp/*.test.mjs
